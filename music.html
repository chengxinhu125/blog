<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐时光 - 小波工作博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
        header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 2rem 1rem; text-align: center; }
        header .emoji { font-size: 3rem; margin-bottom: 0.5rem; }
        header h1 { font-size: 1.6rem; letter-spacing: 2px; }
        header p { opacity: 0.6; font-size: 0.9rem; margin-top: 0.3rem; }
        .nav-back { max-width: 960px; margin: 1.5rem auto 0; padding: 0 1rem; }
        .nav-back a { display: inline-block; background: white; color: #667eea; text-decoration: none; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .nav-back a:hover { background: #667eea; color: white; }
        .container { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem 3rem; }
        .player-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .player-card h3 { color: #1a1a2e; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .player-card p { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
        audio { width: 100%; outline: none; }
        audio::-webkit-media-controls-panel { background: #f5f5f5; }
        .playlist { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .playlist h3 { font-size: 1rem; color: #1a1a2e; margin-bottom: 1rem; border-bottom: 2px solid #667eea22; padding-bottom: 0.5rem; }
        .playlist-item { display: flex; align-items: center; gap: 12px; padding: 0.8rem 0; border-bottom: 1px solid #f0f0f0; }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-item .num { width: 24px; height: 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
        .playlist-item .info h4 { font-size: 0.95rem; color: #333; }
        .playlist-item .info p { font-size: 0.8rem; color: #aaa; }
        footer { background: #1a1a2e; color: rgba(255,255,255,0.5); text-align: center; padding: 2rem 1rem; font-size: 0.82rem; margin-top: 2rem; }
        footer span { color: #667eea; }
    </style>
</head>
<body>
    <header>
        <div class="emoji">🎵</div>
        <h1>音乐时光</h1>
        <p>工作累了？让音乐陪你休息一下 🎧</p>
    </header>
    <div class="nav-back">
        <a href="index.html">← 返回博客首页</a>
    </div>
    <div class="container">
        <div class="player-card">
            <h3>🎧 每日推荐音乐</h3>
            <p>暂无本地音乐文件，点击播放在线音乐</p>
            <audio controls>
                <source src="" type="audio/mpeg">
                您的浏览器不支持音频播放
            </audio>
        </div>

        <div class="player-card">
            <h3>☁️ 网络音乐播放器</h3>
            <p>点击下面的链接，在新窗口打开喜欢的音乐平台</p>
        </div>

        <div class="playlist">
            <h3>🎶 在线音乐链接</h3>
            <div class="playlist-item">
                <div class="num">1</div>
                <div class="info">
                    <h4>QQ音乐</h4>
                    <p>海量正版音乐，随心听</p>
                </div>
            </div>
            <div class="playlist-item">
                <div class="num">2</div>
                <div class="info">
                    <h4>网易云音乐</h4>
                    <p>评论区里藏着无数故事</p>
                </div>
            </div>
            <div class="playlist-item">
                <div class="num">3</div>
                <div class="info">
                    <h4>酷狗音乐</h4>
                    <p>经典老歌，一听就爱上</p>
                </div>
            </div>
            <div class="playlist-item">
                <div class="num">4</div>
                <div class="info">
                    <h4>喜马拉雅</h4>
                    <p>有声书、脱口秀、知识付费</p>
                </div>
            </div>
        </div>

        <div class="player-card" style="margin-top: 1.2rem; background: linear-gradient(135deg, #667eea11, #764ba211); border: 1px dashed #667eea44;">
            <h3>📁 如何添加自己的音乐</h3>
            <p>把音乐文件（MP3格式）放到 <code>/volume2/blog/music/</code> 目录，然后告诉我帮你添加播放列表 🎵</p>
        </div>
    </div>
    <footer>
        <p>© 2026 小波工作博客 · 由 <span>豆丁</span> 管理 | 岚县</p>
    </footer>
</body>
</html>
